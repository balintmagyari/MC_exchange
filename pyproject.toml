[build-system]
requires = ["hatchling", "lammps", "mpi4py", "numpy"]
build-backend = "hatchling.build"

[project]
name = "MC_exchange"
version = "0.0.2"
authors = [
  {name="Balint Magyari", email="balint.magyari@unina.it"},
]
description = "MC Bond Exchange for LAMMPS Simulations"
readme = "README.md"
requires-python = ">=3.12"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
license = "MIT"
license-files = ["LICENSE"]